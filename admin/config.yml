# Decap CMS — git-based, commits to the repo, Netlify builds on push.
# Auth: Netlify Identity + Git Gateway (email invite; no GitHub account needed).
backend:
  name: git-gateway
  branch: main

# Local editing without Netlify: run the proxy (`make cms`) + `make dev`,
# open http://localhost:8000/admin/ — only active on localhost.
local_backend: true

publish_mode: editorial_workflow
media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"
locale: "it"

# The CMS edits ONLY projects. Everything else (brand, home, studio, contact)
# is developer-managed in the repo and is intentionally not exposed here.
collections:
  # ---- Selected projects (one file per project; client clicks "New") -------
  - name: projects
    label: "Progetti"
    label_singular: "Progetto"
    folder: "src/_projects"
    create: true
    identifier_field: slug
    slug: "{{fields.slug}}"
    summary: "{{order}} · {{title_it}}"
    sortable_fields: [order]
    fields:
      - {
          name: slug,
          label: "Slug (URL)",
          widget: string,
          hint: "Minuscolo, senza spazi. Es: cucina-elevata",
        }
      - {
          name: order,
          label: "Ordine",
          widget: number,
          value_type: int,
          default: 1,
        }
      - {
          name: featured,
          label: "In evidenza in home",
          widget: boolean,
          default: false,
        }
      - {
          name: draft,
          label: "Bozza (non pubblicare)",
          widget: boolean,
          default: false,
        }
      - { name: title_it, label: "Titolo (IT)", widget: string }
      - { name: title_en, label: "Title (EN)", widget: string }
      - name: gallery
        label: "Contenuto del progetto"
        label_singular: "blocco"
        widget: list
        hint: "Aggiungi blocchi «Immagine» o «Testo» col pulsante in basso, poi trascinali per ordinarli. Immagini verticali a coppie (2 per riga), orizzontali da sole. Il testo occupa tutta la larghezza. La prima immagine è la copertina."
        types:
          - name: image
            label: "Immagine"
            widget: object
            summary: "Immagine — {{fields.orientation}}"
            fields:
              - { name: image, label: "Immagine", widget: image }
              - {
                  name: orientation,
                  label: "Orientamento",
                  widget: select,
                  options:
                    [
                      { label: "Verticale (metà riga, a coppie)", value: "verticale" },
                      { label: "Orizzontale (riga intera)", value: "orizzontale" },
                    ],
                  default: "verticale",
                  hint: "Verticale = due affiancate per riga (mettine due). Orizzontale = da sola su tutta la riga. La proporzione esatta (3:4/9:16 oppure 4:3/16:9) è scelta in automatico dalla foto.",
                }
          - name: text
            label: "Testo"
            widget: object
            summary: "Testo — {{fields.text_it}}"
            fields:
              - { name: text_it, label: "Testo (IT)", widget: text }
              - { name: text_en, label: "Text (EN)", widget: text, required: false }
