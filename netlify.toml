# Netlify build + hosting for the Eleventy site.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Language-aware 404: EN 404 under /en/*, IT 404 elsewhere. Existing files take
# precedence (these only fire for unmatched paths). Specific rule must come first.
[[redirects]]
  from = "/en/*"
  to = "/en/404.html"
  status = 404

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Long-cache fingerprinted assets (Eleventy Image filenames are content-hashed).
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
