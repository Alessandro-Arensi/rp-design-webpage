<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>PIANA — Content</title>
    <!-- match the site favicon (Decap otherwise shows its own) -->
    <link rel="icon" href="/assets/icons/favicon-rp.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  </head>
  <body>
    <!-- Decap CMS — reads /admin/config.yml.
         Production auth: Netlify Identity + Git Gateway (enable both in Netlify UI).
         Local editing: `make cms` (decap-server) + `make dev`, then open /admin/. -->
    <script src="https://unpkg.com/decap-cms@^3.6.3/dist/decap-cms.js"></script>

    <!-- Custom preview for Projects: renders the SAME DOM + classes as the site
         detail page and loads the real site CSS into the preview iframe, so the
         typography, text sizes and gaps match the rendered page 1:1. Images
         resolve via getAsset. -->
    <script>
      (function () {
        if (!window.CMS || !window.h || !window.createClass) return;
        var h = window.h;
        var CMS = window.CMS;

        // Real stylesheets into the preview iframe…
        CMS.registerPreviewStyle("/assets/css/base.css");
        CMS.registerPreviewStyle("/assets/css/app.css");
        // …plus the brand tokens the site injects inline per page (colours +
        // display/body font), which the iframe would otherwise be missing.
        CMS.registerPreviewStyle(
          ":root{" +
            "--c-bg:#f9f7f2;--c-ink:#1a1a18;--c-ink-soft:#6b6862;" +
            "--c-line:#ddd7c9;--c-accent:#a27b5a;--c-dark:#272a32;" +
            '--ff-display:"ABC Arizona Flare",Georgia,"Times New Roman",serif;' +
            '--ff-body:"ABC Arizona Flare",Georgia,"Times New Roman",serif' +
            "}body{background:var(--c-bg);color:var(--c-ink)}" +
            // The site hides the scrollbar because Lenis drives scrolling; the
            // preview has no Lenis, so restore native scroll + a real scrollbar
            // (otherwise the pane can't be scrolled after a SplitPane resize).
            "html{scrollbar-width:auto!important;-ms-overflow-style:auto!important;overflow-y:auto!important}" +
            "html::-webkit-scrollbar{display:block!important;width:12px!important;height:12px!important}" +
            "html::-webkit-scrollbar-thumb{background:#c9c3b5!important;border-radius:6px}",
          { raw: true }
        );

        // Editors pick only an orientation; snap to the closest allowed ratio
        // using the loaded image's real dimensions (matches the site build).
        var CANDS = {
          orizzontale: [["4:3", 4 / 3], ["16:9", 16 / 9]],
          verticale: [["3:4", 3 / 4], ["9:16", 9 / 16]],
        };
        function snapRatio(orient, aspect) {
          var c = CANDS[orient] || CANDS.verticale;
          if (!aspect) return c[0][0];
          var best = c[0][0], bd = Infinity;
          for (var k = 0; k < c.length; k++) {
            var d = Math.abs(aspect - c[k][1]);
            if (d < bd) { bd = d; best = c[k][0]; }
          }
          return best;
        }
        function orientationOf(g) {
          var o = g.get("orientation");
          if (o) return o;
          var r = g.get("ratio"); // legacy fallback
          if (r === "16:9" || r === "4:3" || r === 969 || r === 243) return "orizzontale";
          return "verticale";
        }

        var ProjectPreview = window.createClass({
          // Chromium leaves an iframe's wheel/trackpad scroll dead after the
          // parent resizes it (stale compositor hit-test) until a main-thread
          // scroll — e.g. dragging the scrollbar. The iframe fires `resize`
          // when the SplitPane moves; nudging overflow then rebuilds the scroll
          // node so the wheel keeps working without touching the scrollbar.
          componentDidMount: function () {
            var el = this.root;
            if (!el || !el.ownerDocument) return;
            var win = el.ownerDocument.defaultView;
            var de = el.ownerDocument.documentElement;
            if (!win || !de) return;
            this._nudge = function () {
              de.style.setProperty("overflow-y", "hidden", "important");
              win.requestAnimationFrame(function () {
                de.style.removeProperty("overflow-y");
              });
            };
            win.addEventListener("resize", this._nudge);
          },
          componentWillUnmount: function () {
            var el = this.root;
            if (this._nudge && el && el.ownerDocument && el.ownerDocument.defaultView) {
              el.ownerDocument.defaultView.removeEventListener("resize", this._nudge);
            }
          },
          render: function () {
            var self = this;
            var entry = this.props.entry;
            var getAsset = this.props.getAsset;
            var data = entry.get("data");
            var title = data.get("title_it") || data.get("title_en") || "Progetto";
            var statement = data.get("statement_it") || data.get("statement_en") || "";
            var gallery = data.get("gallery");
            var items = gallery && gallery.toArray ? gallery.toArray() : [];

            var blocks = items.map(function (g, i) {
              var image = g.get("image");
              var text = g.get("text_it") || g.get("text_en");
              if (image) {
                var orient = orientationOf(g);
                var horiz = orient === "orizzontale";
                // sensible default box; corrected to the snapped ratio on load
                var initCls = horiz ? "is-full is-r-16-9" : "is-r-3-4";
                return h(
                  "figure",
                  { key: i, className: initCls },
                  h(
                    "button",
                    { className: "g-trigger", type: "button" },
                    h("img", {
                      src: getAsset(image),
                      alt: "",
                      onLoad: function (e) {
                        var im = e.target;
                        var a = im.naturalWidth && im.naturalHeight ? im.naturalWidth / im.naturalHeight : null;
                        var tok = snapRatio(orient, a);
                        var fig = im.closest && im.closest("figure");
                        if (fig) fig.className = (horiz ? "is-full " : "") + "is-r-" + tok.replace(":", "-");
                      },
                    })
                  )
                );
              }
              if (text) {
                return h("div", { key: i, className: "project-text" }, h("p", {}, text));
              }
              return null;
            });

            return h(
              "article",
              { className: "project-detail", ref: function (n) { self.root = n; } },
              h(
                "div",
                { className: "project-body" },
                h(
                  "header",
                  { className: "project-head" },
                  h("p", { className: "eyebrow" }, title),
                  statement ? h("h1", { className: "statement" }, statement) : null
                ),
                h("div", { className: "project-gallery" }, blocks)
              )
            );
          },
        });

        CMS.registerPreviewTemplate("projects", ProjectPreview);
      })();
    </script>
  </body>
</html>
